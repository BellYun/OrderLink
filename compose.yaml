services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orderlink
      POSTGRES_USER: orderlink
      POSTGRES_PASSWORD: orderlink
    ports:
      - "5432:5432"
    volumes:
      - orderlink-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderlink -d orderlink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orderlink-postgres:

