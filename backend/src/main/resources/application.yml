spring:
  application:
    name: orderlink-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderlink}
    username: ${DB_USERNAME:orderlink}
    password: ${DB_PASSWORD:orderlink}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

